{% set version = "1.1.2" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-tidycmprsk
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/tidycmprsk_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/tidycmprsk/tidycmprsk_{{ version }}.tar.gz
  sha256: 36f0470177b380a391169d2ef836a7cbac30a624f336360c4b17f3ce65d4616e

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-broom >=1.0.1
    - r-cli
    - r-cmprsk >=2.2.10
    - r-dplyr
    - r-ggplot2 >=3.3.5
    - r-gtsummary >=2.0.0
    - r-hardhat >=1.3.0
    - r-purrr >=0.3.4
    - r-rlang
    - r-stringr >=1.4.0
    - r-survival
    - r-tibble >=3.1.6
    - r-tidyr
  run:
    - r-base
    - r-broom >=1.0.1
    - r-cli
    - r-cmprsk >=2.2.10
    - r-dplyr
    - r-ggplot2 >=3.3.5
    - r-gtsummary >=2.0.0
    - r-hardhat >=1.3.0
    - r-purrr >=0.3.4
    - r-rlang
    - r-stringr >=1.4.0
    - r-survival
    - r-tibble >=3.1.6
    - r-tidyr

test:
  commands:
    - $R -e "library('tidycmprsk')"           # [not win]
    - "\"%R%\" -e \"library('tidycmprsk')\""  # [win]

about:
  home: https://mskcc-epi-bio.github.io/tidycmprsk/
  dev_url: https://github.com/MSKCC-Epi-Bio/tidycmprsk
  license: AGPL-3.0-or-later
  summary: Provides an intuitive interface for working with the competing risk endpoints. The package wraps the 'cmprsk' package, and exports functions for univariate cumulative incidence estimates and competing risk regression. Methods follow those introduced in Fine and Gray (1999) <doi:10.1002/sim.7501>.
  license_family: AGPL
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/AGPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
